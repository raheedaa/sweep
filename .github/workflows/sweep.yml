name: Daily Sweep

on:
  schedule:
    - cron: '20 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install

      - name: Build the feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL: ${{ vars.MODEL }}
        run: npm run build

      - name: Publish feed.json
        run: |
          git config user.name "sweep-bot"
          git config user.email "actions@users.noreply.github.com"
          git add feed.json
          git commit -m "Update feed $(date -u +%Y-%m-%dT%H:%MZ)" || echo "nothing changed"
          git push
