name: Daily Sweep

on:
  schedule:
    - cron: '20 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build the feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_SWEEP }}
          ANTHROPIC_API_KEY_SWEEP: ${{ secrets.ANTHROPIC_API_KEY_SWEEP }}
          MODEL: ${{ vars.MODEL }}
        run: node build-feed.js
      - name: Publish feed.json
        run: |
          git config user.name "sweep-bot"
          git config user.email "actions@users.noreply.github.com"
          git add feed.json || true
          git commit -m "Update feed" || echo "nothing changed"
          git pull --rebase --autostash || true
          git push || echo "push skipped"
